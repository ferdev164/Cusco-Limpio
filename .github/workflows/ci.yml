name: CI - Integración Continua

# Evento que dispara el workflow: cada push a la rama main
on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    name: Compilar y ejecutar pruebas
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código fuente del repositorio
      - name: Descargar código fuente
        uses: actions/checkout@v4

      # 2. Instalar Node.js
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: npm install

      # 4. Ejecutar las pruebas unitarias
      - name: Ejecutar pruebas
        run: npm test

      # 5. Mostrar el resultado de la ejecución
      - name: Resultado de la ejecución
        if: always()
        run: echo "Workflow finalizado con estado ${{ job.status }}"