name: CI - Integración Continua

on:
  push:
    branches: [ main ]

jobs:
  backend:
    name: Backend - Instalar y probar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas
        run: npm test

      - name: Resultado de la ejecución
        if: always()
        run: echo "Backend finalizado con estado ${{ job.status }}"

  frontend:
    name: Frontend - Instalar, lint y build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar lint
        run: npm run lint

      - name: Compilar (build)
        run: npm run build

      - name: Resultado de la ejecución
        if: always()
        run: echo "Frontend finalizado con estado ${{ job.status }}"